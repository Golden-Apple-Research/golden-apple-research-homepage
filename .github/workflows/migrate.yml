name: Migrate Database

on:
  push:
    branches:
      - main

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # with:
        #   version: 10.24.0 # Deine Version aus package.json [2]

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25.7"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Drizzle Migration
        run: pnpm drizzle-kit push --url $POSTGRES_URL --dialect postgresql --schema src/lib/db/schema.ts --verbose
        env:
          # WICHTIG: Nutze hier den Direct Connection String (Port 5432)!
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
